name: moonkid

x-backend-environment: &backend-environment
  NODE_ENV: development
  HOST: 0.0.0.0
  PORT: 3000
  DATABASE_URL: postgresql://${POSTGRES_USER:-moonkid}:${POSTGRES_PASSWORD:-moonkid_dev_password}@postgres:5432/${POSTGRES_DB:-moonkid}?schema=public
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-moonkid_redis_dev}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local_access_secret_change_before_deploy_0123456789}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local_refresh_secret_change_before_deploy_0123456789}
  JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
  JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
  FRONTEND_URL: ${APP_URL:-http://localhost:8088}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:8088/api/auth/google/callback}
  MAIL_HOST: mailpit
  MAIL_PORT: 1025
  MAIL_FROM: ${MAIL_FROM:-"MoonKid" <no-reply@moonkid.local>}
  MINIO_ENDPOINT: minio
  MINIO_PORT: 9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-moonkid}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-moonkid_minio_dev}
  MINIO_USE_SSL: "false"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moonkid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moonkid_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-moonkid}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - 127.0.0.1:${POSTGRES_PORT:-5432}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-moonkid} -d ${POSTGRES_DB:-moonkid}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [data]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:-moonkid_redis_dev}",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - 127.0.0.1:${REDIS_PORT:-6379}:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a '${REDIS_PASSWORD:-moonkid_redis_dev}' ping | grep PONG",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [data]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-moonkid}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-moonkid_minio_dev}
    ports:
      - 127.0.0.1:${MINIO_API_PORT:-9000}:9000
      - 127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [data]

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-moonkid}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-moonkid_minio_dev}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        for bucket in products banners reviews avatars; do
          mc mb --ignore-existing "local/$${bucket}"
          mc anonymous set download "local/$${bucket}"
        done
    networks: [data]

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
      - 127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025
      - 127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [data]

  db-migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: migration
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-moonkid}:${POSTGRES_PASSWORD:-moonkid_dev_password}@postgres:5432/${POSTGRES_DB:-moonkid}?schema=public
    networks: [data]

  db-seed:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: migration
    restart: "no"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-moonkid}:${POSTGRES_PASSWORD:-moonkid_dev_password}@postgres:5432/${POSTGRES_DB:-moonkid}?schema=public
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@moonkid.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-MoonKid@123}
      SEED_CUSTOMER_EMAIL: ${SEED_CUSTOMER_EMAIL:-customer@moonkid.local}
      SEED_CUSTOMER_PASSWORD: ${SEED_CUSTOMER_PASSWORD:-MoonKid@123}
    command: ["npx", "prisma", "db", "seed"]
    networks: [data]

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      db-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    environment: *backend-environment
    ports:
      - 127.0.0.1:${BACKEND_PORT:-8080}:3000
    volumes:
      - ../backend/src:/app/src
      - ../backend/prisma:/app/prisma
      - ../backend/test:/app/test
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks: [app, data, egress]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_URL: http://backend:3000/api
      NEXT_TELEMETRY_DISABLED: 1
      WATCHPACK_POLLING: "true"
    ports:
      - 127.0.0.1:${FRONTEND_PORT:-3000}:3000
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - ../frontend/next.config.ts:/app/next.config.ts
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks: [app]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - ${HTTP_PORT:-8088}:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [edge, app, data]

  adminer:
    image: adminer:4
    profiles: [tools]
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - 127.0.0.1:${ADMINER_PORT:-8081}:8080
    depends_on:
      postgres:
        condition: service_healthy
    networks: [data]

networks:
  edge:
  app:
  data:
  egress:

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mailpit_data:
