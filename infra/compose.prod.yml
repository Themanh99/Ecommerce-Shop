name: moonkid

x-backend-environment: &backend-environment
  NODE_ENV: production
  HOST: 0.0.0.0
  PORT: 3000
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-moonkid}?schema=public
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
  JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
  FRONTEND_URL: ${APP_URL}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
  MAIL_HOST: ${MAIL_HOST}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USER: ${MAIL_USER:-}
  MAIL_PASS: ${MAIL_PASS:-}
  MAIL_FROM: ${MAIL_FROM}
  MINIO_ENDPOINT: minio
  MINIO_PORT: 9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  MINIO_USE_SSL: "false"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-moonkid}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-moonkid}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [data]

  redis:
    image: redis:7-alpine
    restart: always
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--maxmemory",
        "${REDIS_MAXMEMORY:-512mb}",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [data]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [data]

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        for bucket in products banners reviews avatars; do
          mc mb --ignore-existing "local/$${bucket}"
          mc anonymous set download "local/$${bucket}"
        done
    networks: [data]

  db-migrate:
    image: ${BACKEND_IMAGE:-moonkid-backend:local}
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: migration
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-moonkid}?schema=public
    networks: [data]

  backend:
    image: ${BACKEND_IMAGE:-moonkid-backend:local}
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    restart: always
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment: *backend-environment
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [app, data, egress]

  frontend:
    image: ${FRONTEND_IMAGE:-moonkid-frontend:local}
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: production
      args:
        API_URL: http://backend:3000/api
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_URL: http://backend:3000/api
      NEXT_TELEMETRY_DISABLED: 1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [app]

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - ${HTTP_PORT:-80}:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [edge, app, data]

networks:
  edge:
  app:
    internal: true
  data:
    internal: true
  egress:

volumes:
  postgres_data:
  redis_data:
  minio_data:
