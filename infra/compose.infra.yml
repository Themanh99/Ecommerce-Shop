name: moonkid

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moonkid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moonkid_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-moonkid}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - 127.0.0.1:${POSTGRES_PORT:-5432}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-moonkid} -d ${POSTGRES_DB:-moonkid}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [infra]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:-moonkid_redis_dev}",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - 127.0.0.1:${REDIS_PORT:-6379}:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a '${REDIS_PASSWORD:-moonkid_redis_dev}' ping | grep PONG",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [infra]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-moonkid}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-moonkid_minio_dev}
    ports:
      - 127.0.0.1:${MINIO_API_PORT:-9000}:9000
      - 127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [infra]

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-moonkid}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-moonkid_minio_dev}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        for bucket in products banners reviews avatars; do
          mc mb --ignore-existing "local/$${bucket}"
          mc anonymous set download "local/$${bucket}"
        done
    networks: [infra]

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
      - 127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025
      - 127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [infra]

  adminer:
    image: adminer:4
    profiles: [tools]
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - 127.0.0.1:${ADMINER_PORT:-8081}:8080
    depends_on:
      postgres:
        condition: service_healthy
    networks: [infra]

networks:
  infra:

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mailpit_data:
