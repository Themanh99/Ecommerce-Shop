name: EShop Continuous Integration

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  # ─── BACKEND BUILD & TEST ──────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Validate Prisma Schema
        run: |
          cd backend
          npx prisma validate

      - name: Run Linter
        run: |
          cd backend
          npm run lint

      - name: Build Application
        run: |
          cd backend
          npm run build

      - name: Run Unit Tests
        run: |
          cd backend
          npm run test -- --passWithNoTests

  # ─── FRONTEND BUILD & LINT ──────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Linter
        run: |
          cd frontend
          npm run lint

      - name: Build Next.js Application
        run: |
          cd frontend
          npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          API_URL: http://localhost:8080/api

  # ─── DOCKER BUILD VERIFICATION ──────────────────────────────
  docker-ci:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build Backend Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false

      - name: Test Build Frontend Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          build-args: |
            API_URL=http://backend:3000/api
